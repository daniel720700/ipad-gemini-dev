<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vibe Coding" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <title>Vibe Coding Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .title {
      text-align: center;
    }

    .title h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f0f6ff;
    }

    .title p {
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: min(100%, 360px);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px 16px;
      border-radius: 22px;
      text-decoration: none;
      color: #e2e8f0;
      background: #161b22;
      border: 1px solid #21262d;
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .card:active {
      transform: scale(0.96);
      background: #1c2128;
    }

    .card .icon {
      font-size: 36px;
      line-height: 1;
    }

    .card .label {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }

    .card .desc {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      line-height: 1.4;
    }

    .card.claude  { border-color: rgba(124, 58, 237, 0.4); }
    .card.gemini  { border-color: rgba(59, 130, 246, 0.4); }
    .card.codespace { border-color: rgba(34, 197, 94, 0.4); }
    .card.github  { border-color: rgba(148, 163, 184, 0.3); }
    .card.memo    { border-color: rgba(251, 191, 36, 0.4); }
  </style>
</head>
<body>
  <div class="title">
    <h1>Vibe Coding</h1>
    <p>Claude + Gemini + Codespace</p>
  </div>

  <div class="grid">
    <a class="card claude" href="https://claude.ai/" target="_blank" rel="noopener">
      <div class="icon">🤖</div>
      <div class="label">Claude</div>
      <div class="desc">AI 대화 & 코딩</div>
    </a>

    <a class="card gemini" href="https://gemini.google.com/" target="_blank" rel="noopener">
      <div class="icon">✨</div>
      <div class="label">Gemini</div>
      <div class="desc">설계 & 리뷰</div>
    </a>

    <a class="card codespace" href="https://urban-waddle-xrwpx696q5prcp9x.github.dev" target="_blank" rel="noopener">
      <div class="icon">💻</div>
      <div class="label">Codespace</div>
      <div class="desc">Claude Code 환경</div>
    </a>

    <a class="card github" href="https://github.com/daniel720700/ipad-gemini-dev" target="_blank" rel="noopener">
      <div class="icon">📁</div>
      <div class="label">Repository</div>
      <div class="desc">소스 코드</div>
    </a>

    <a class="card memo" href="memo.html">
      <div class="icon">📝</div>
      <div class="label">메모장</div>
      <div class="desc">빠른 메모 & 저장</div>
    </a>
  </div>
</body>
</html>
