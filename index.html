<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vibe Code" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <title>Vibe Code</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e6edf3;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1a73e8, #8430ce);
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
      margin-bottom: 12px;
    }

    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: linear-gradient(135deg, #1a73e8, #8430ce);
      color: #fff;
    }

    .btn-secondary {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: #8b949e;
      margin-top: 24px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3fb950;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Vibe Code</h1>
    <p class="subtitle">iPad · Gemini Pro · GitHub Codespace<br>Python 개발 환경</p>

    <a class="btn btn-primary" href="https://codespaces.new/daniel720700/ipad-gemini-dev">
      🚀 코딩 시작하기
    </a>
    <a class="btn btn-secondary" href="https://github.com/codespaces">
      📋 내 Codespaces 목록
    </a>

    <div class="badge">
      <span class="dot"></span>
      daniel720700 / ipad-gemini-dev
    </div>
  </div>
</body>
</html>
